<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> 똥을 피하고 돈을 먹자 </title>
<style>
body{
    margin:0;
    background: radial-gradient(circle, #4bbbdd, #ffffff);
    font-family:sans-serif;
    text-align:center;
    color:white;
    touch-action:none;
}
h1{
    margin:10px;
    color:#2299ff; /* 💡 제목 색상을 파란색으로 변경 */
    text-shadow:0 0 10px #0055ff; /* 💡 그림자 효과도 파란색으로 변경 */
    font-size:24px;
}
#game{
    width:100vw;
    height:80vh;
    position:relative;
    overflow:hidden;
    border-top:3px solid #0055ff; /* 💡 위쪽 선을 파란색으로 변경 */
    border-bottom:3px solid #0055ff; /* 💡 아래쪽 선을 파란색으로 변경 */
    background: linear-gradient(rgba(0,85,255,0.05), rgba(0,0,0,0.2)); /* 배경 광원도 은은한 푸른빛으로 보정 */
    cursor: default; 
}

#ui-layer {
    position: absolute;
    top: 15px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between; 
    padding: 0 20px;
    box-sizing: border-box;
    z-index: 5; 
    pointer-events: none; 
}
#hearts{
    font-size:28px;
    color:red;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
}
#goldText{
    font-size:22px;
    color:gold;
    font-weight: bold;
    text-shadow: 0 0 5px rgba(0,0,0,0.8);
}

#player{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:60px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    pointer-events:none;
}
#player img{
    width:60px;
    height:60px;
}

.item{
    position:absolute;
    width:40px;
    height:40px;
}

.item img{
    width:100%;
    height:100%;
    object-fit:contain;
}
#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    font-size:22px;
    cursor: pointer;
}
#small{
    margin-top:15px;
    font-size:13px;
    color:#bbbbbb;
}
#rankingBox{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.88);
    z-index:20;
    overflow-y:auto;
    padding-top:40px;
    box-sizing:border-box;
}
#rankingContent{
    width:300px;
    margin:auto;
    background:rgba(0,20,50,0.9); /* 랭킹창 배경도 푸른빛이 도는 어두운색으로 변경 */
    border:2px solid #0055ff; /* 랭킹창 테두리 파란색으로 변경 */
    border-radius:15px;
    padding:20px;
}
#restartBtn{
    margin-top:20px;
    width:100%;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#0044cc; /* 💡 다시 시작 버튼 파란색으로 변경 */
    color:white;
    cursor:pointer;
}
#restartBtn:hover{
    background:#0066ff;
}
</style>
</head>
<body>

<h1> 똥을 피하고 돈을 먹자 </h1>

<div id="game">
    <div id="ui-layer">
        <div id="hearts">❤️❤️❤️</div>
        <div id="goldText">골드 : 0 / 100</div>
    </div>

    <div id="player">
        <img src="trashbin.png" width="60" height="60"> </div>
    <div id="startScreen">
        <div>화면 클릭 / 터치해서 시작</div>
        <div id="small"> 똥을 피하고 돈을 먹자 </div>
    </div>
    <div id="rankingBox">
        <div id="rankingContent">
            <h2>당신은 똥을 맞았습니다.</h2>
            <div id="finalScore"></div>
            <h3>명예의 전당(전체 랭킹)</h3>
            <ol id="allRanking"><li>불러오는 중...</li></ol>
            <h3>똥 잘 피한 사람(오늘의 랭킹)</h3>
            <ol id="todayRanking"><li>불러오는 중...</li></ol>
            <button id="restartBtn">다시 시작</button>
        </div>
    </div>
</div>

<script>
let username = localStorage.getItem("poop_username");

if(!username){
    while(true){
        username = prompt("아이디를 입력하세요");
        if(username === null || username.trim() === ""){
            alert("아이디를 입력해야 합니다!");
            continue;
        }
        break;
    }
    localStorage.setItem("poop_username", username);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDZPkN3bdDgUuFDPlP4-9QuJ24gSSxzBCw",
    authDomain: "sese-eunkn.firebaseapp.com",
    projectId: "sese-eunkn",
    databaseURL: "https://sese-eunkn-default-rtdb.firebaseio.com",
    storageBucket: "sese-eunkn.firebasestorage.app",
    messagingSenderId: "678345123179",
    appId: "1:678345123179:web:1294bd1eba12bd9e0b182e",
    measurementId: "G-W18XMHJ8CM"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const game = document.getElementById("game");
const player = document.getElementById("player");
const startScreen = document.getElementById("startScreen");
const goldText = document.getElementById("goldText");
const rankingBox = document.getElementById("rankingBox");
const finalScore = document.getElementById("finalScore");
const restartBtn = document.getElementById("restartBtn");
const allRanking = document.getElementById("allRanking");
const todayRanking = document.getElementById("todayRanking");

let gameStarted = false;
let gameOver = false;
let lives = 3;
let goldCount = 0;
let goldenMode = false;
let startTime = 0;

// 하트 표시 업데이트
function updateHearts(){
    let text = "";
    for(let i=0; i<lives; i++){
        text += "❤️";
    }
    document.getElementById("hearts").innerText = text;
}

// 랭킹 시스템 실시간 실현
function loadRankings(){
    const rankingsRef = ref(db, "rankings");
    onValue(rankingsRef, (snapshot)=>{
        const data = snapshot.val();
        if(!data) return;

        const rankings = Object.values(data);
        const today = new Date().toLocaleDateString();

        const allSorted = [...rankings]
            .sort((a,b)=> b.score - a.score)
            .slice(0,5);

        allRanking.innerHTML = "";
        allSorted.forEach(r=>{
            const li = document.createElement("li");
            li.innerText = `${r.name} - ${r.score}개`;
            allRanking.appendChild(li);
        });

        const todaySorted = rankings
            .filter(r=> r.date === today)
            .sort((a,b)=> b.score - a.score)
            .slice(0,5);

        todayRanking.innerHTML = "";
        todaySorted.forEach(r=>{
            const li = document.createElement("li");
            li.innerText = `${r.name} - ${r.score}개`;
            todayRanking.appendChild(li);
        });
    });
}

// 골드 개수 저장
async function saveScore(){
    const today = new Date().toLocaleDateString();
    push(ref(db, "rankings"), {
        name: username,
        score: goldCount,
        date: today
    });
}

// 게임 시작 핸들러
startScreen.addEventListener("click", startGame);
startScreen.addEventListener("touchstart", startGame);

function startGame(){
    if(gameStarted) return;
    startTime = Date.now();
    gameStarted = true;
    startScreen.style.display = "none";
    spawnLoop();
}

// 마우스 커서 이동 제한 보정 완료
game.addEventListener("mousemove", (e) => {
    if (!gameStarted || gameOver) return;

    const gameRect = game.getBoundingClientRect();
    let currentX = e.clientX - gameRect.left;

    if (currentX < 30) currentX = 30;
    if (currentX > gameRect.width - 30) currentX = gameRect.width - 30;

    player.style.transform = "none";
    player.style.left = (currentX - 30) + "px";
});

// 모바일 터치 이동 보정 완료
game.addEventListener("touchmove", (e) => {
    if (!gameStarted || gameOver) return;

    const touch = e.touches[0];
    const gameRect = game.getBoundingClientRect();
    let currentX = touch.clientX - gameRect.left;

    if (currentX < 30) currentX = 30;
    if (currentX > gameRect.width - 30) currentX = gameRect.width - 30;

    player.style.transform = "none";
    player.style.left = (currentX - 30) + "px";
});

// 똥 생성
function createPoop(){
    const poop = document.createElement("div");
    poop.classList.add("item");

    if(goldenMode){
        poop.innerHTML = `<img src="goldenpoop.png" width="40" height="40">`;
    }else{
        poop.innerHTML = `<img src="poop.png" width="40" height="40">`;
    }
    
    let x = Math.random() * (game.offsetWidth - 40);
    let y = -50;
    const elapsed = (Date.now() - startTime) / 1000;
    let speed = 7 + (elapsed * 0.1) + Math.random() * 6;

    poop.style.left = x + "px";
    poop.style.top = y + "px";
    game.appendChild(poop);

    function fall(){
        if(gameOver) return;

        y += speed;
        poop.style.top = y + "px";

        const playerRect = player.getBoundingClientRect();
        const poopRect = poop.getBoundingClientRect();

        if(
            poopRect.left < playerRect.right &&
            poopRect.right > playerRect.left &&
            poopRect.top < playerRect.bottom &&
            poopRect.bottom > playerRect.top
        ){
            poop.remove();
            lives--;
            updateHearts();

            if(lives <= 0){
                gameOver = true;
                saveScore();
                loadRankings();
                finalScore.innerHTML = `<h3>${username}</h3><h2>골드 개수 : ${goldCount}개</h2>`;
                rankingBox.style.display = "block";
            }
            return;
        }

        if(y > game.offsetHeight){
            poop.remove();
            return;
        }

        requestAnimationFrame(fall);
    }
    fall();
}

// 골드 생성
function createGold(){
    const gold = document.createElement("div");
    gold.classList.add("item");
    gold.innerHTML = `<img src="gold.png" width="40" height="40">`;

    let x = Math.random() * (game.offsetWidth - 40);
    let y = -50;
    const elapsed = (Date.now() - startTime) / 1000;
    let speed = 7 + (elapsed * 0.1) + Math.random() * 6;

    gold.style.left = x + "px";
    gold.style.top = y + "px";
    game.appendChild(gold);

    function fall(){
        if(gameOver) return;

        y += speed;
        gold.style.top = y + "px";

        const playerRect = player.getBoundingClientRect();
        const goldRect = gold.getBoundingClientRect();

        if(
            goldRect.left < playerRect.right &&
            goldRect.right > playerRect.left &&
            goldRect.top < playerRect.bottom &&
            goldRect.bottom > playerRect.top
        ){
            gold.remove();
            goldCount++;

            goldText.innerText = "골드 : " + goldCount + " / 100";

            if(goldCount >= 100){
                goldenMode = true;
                document.body.style.background = "radial-gradient(circle, gold, black)";
            }
            return;
        }

         if(y > game.offsetHeight){
            gold.remove();
            return;
        }

        requestAnimationFrame(fall);
    }
    fall();
}

// 오브젝트 스폰 루프
function spawnLoop(){
    if(gameOver) return;

    if(Math.random() < 0.5){
        createPoop();
    }
    if(Math.random() < 0.35){
        createGold();
    }

    let delay = 600 - (goldCount * 10) * 0.25; 
    if(delay < 180){
        delay = 180;
    }

    setTimeout(spawnLoop, delay);
}

// 재시작 단추
restartBtn.addEventListener("click", ()=>{
    location.reload();
});
</script>
</body>
</html>
