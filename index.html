<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🚽 공포 똥 피하기 🚽</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background: radial-gradient(circle, #400000, #000000);
    font-family:sans-serif;
    text-align:center;
    color:white;
    touch-action:none;
}
h1{
    margin:10px;
    color:#ff4444;
    text-shadow:0 0 10px red;
    font-size:24px;
}
#game{
    width:100vw;
    height:80vh;
    position:relative;
    overflow:hidden;
    border-top:3px solid red;
    border-bottom:3px solid red;
    background: linear-gradient(rgba(255,0,0,0.05), rgba(0,0,0,0.2));
    cursor: default; 
}
#player{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:60px;
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    pointer-events:none;
}
.item{
    position:absolute;
    font-size:32px;
}
#hearts{
    margin-top:10px;
    font-size:28px;
    color:red;
}
#score{
    margin-top:10px;
    font-size:22px;
    color:#ff8888;
}
#goldText{
    margin-top:5px;
    font-size:18px;
    color:gold;
}
#startScreen{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:10;
    font-size:22px;
    cursor: pointer;
}
#small{
    margin-top:15px;
    font-size:13px;
    color:#bbbbbb;
}
#rankingBox{
    display:none;
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.88);
    z-index:20;
    overflow-y:auto;
    padding-top:40px;
    box-sizing:border-box;
}
#rankingContent{
    width:300px;
    margin:auto;
    background:rgba(20,0,0,0.9);
    border:2px solid red;
    border-radius:15px;
    padding:20px;
}
#restartBtn{
    margin-top:20px;
    width:100%;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#aa0000;
    color:white;
    cursor:pointer;
}
#restartBtn:hover{
    background:#ff0000;
}
</style>
</head>
<body>

<h1>🚽 공포 똥 피하기 🚽</h1>

<div id="game">
    <div id="player">🚽</div>
    <div id="startScreen">
        <div>화면 클릭 / 터치해서 시작</div>
        <div id="small">💩을 피하고 🪙을 먹어라...</div>
    </div>
    <div id="rankingBox">
        <div id="rankingContent">
            <h2>☠️ 게임 오버 ☠️</h2>
            <div id="finalScore"></div>
            <h3>🏆 전체 랭킹</h3>
            <ol id="allRanking"><li>Firebase 연결 필요</li></ol>
            <h3>🔥 오늘의 랭킹</h3>
            <ol id="todayRanking"><li>Firebase 연결 필요</li></ol>
            <button id="restartBtn">다시 시작</button>
        </div>
    </div>
</div>

<div id="hearts">❤️❤️❤️</div>
<div id="score">점수 : 0</div>
<div id="goldText">골드 : 0 / 100</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDZPkN3bdDgUuFDPlP4-9QuJ24gSSxzBCw",
    authDomain: "sese-eunkn.firebaseapp.com",
    projectId: "sese-eunkn",
    databaseURL: "https://sese-eunkn-default-rtdb.firebaseio.com",
    storageBucket: "sese-eunkn.firebasestorage.app",
    messagingSenderId: "678345123179",
    appId: "1:678345123179:web:1294bd1eba12bd9e0b182e",
    measurementId: "G-W18XMHJ8CM"
  };

// 키값이 비어있을 때 에러로 게임이 멈추는 것을 방지하는 안전장치
let db = null;
if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
    try {
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app);
    } catch(e) {
        console.error("Firebase 초기화 실패:", e);
    }
}

const game = document.getElementById("game");
const player = document.getElementById("player");
const startScreen = document.getElementById("startScreen");
const scoreText = document.getElementById("score");
const goldText = document.getElementById("goldText");
const rankingBox = document.getElementById("rankingBox");
const finalScore = document.getElementById("finalScore");
const restartBtn = document.getElementById("restartBtn");
const allRanking = document.getElementById("allRanking");
const todayRanking = document.getElementById("todayRanking");

let gameStarted = false;
let gameOver = false;
let score = 0;
let lives = 3;
let goldCount = 0;
let goldenMode = false;

// 아이디 설정
let username = localStorage.getItem("poop_username");
if(!username){
    username = prompt("아이디를 입력하세요");
    if(!username || username.trim() === ""){
        username = "익명변기" + Math.floor(Math.random()*9999);
    }
    localStorage.setItem("poop_username", username);
}

// 하트 업데이트
function updateHearts(){
    let text = "";
    for(let i=0; i<lives; i++){
        text += "❤️";
    }
    document.getElementById("hearts").innerText = text;
}

// 랭킹 불러오기
function loadRankings(){
    if(!db) return; // DB 연결 안 되어 있으면 패스
    const rankingsRef = ref(db, "rankings");
    onValue(rankingsRef, (snapshot)=>{
        const data = snapshot.val();
        if(!data) return;

        const rankings = Object.values(data);
        const today = new Date().toLocaleDateString();

        const allSorted = [...rankings]
            .sort((a,b)=> b.score - a.score)
            .slice(0,5);

        allRanking.innerHTML = "";
        allSorted.forEach(r=>{
            const li = document.createElement("li");
            li.innerText = `${r.name} - ${r.score}`;
            allRanking.appendChild(li);
        });

        const todaySorted = rankings
            .filter(r=> r.date === today)
            .sort((a,b)=> b.score - a.score)
            .slice(0,5);

        todayRanking.innerHTML = "";
        todaySorted.forEach(r=>{
            const li = document.createElement("li");
            li.innerText = `${r.name} - ${r.score}`;
            todayRanking.appendChild(li);
        });
    });
}

// 점수 저장
async function saveScore(){
    if(!db) return; // DB 연결 안 되어 있으면 패스
    const today = new Date().toLocaleDateString();
    push(ref(db, "rankings"), {
        name: username,
        score: score,
        date: today
    });
}

// 시작 이벤트 등록
startScreen.addEventListener("click", startGame);
startScreen.addEventListener("touchstart", startGame);

function startGame(){
    if(gameStarted) return;
    gameStarted = true;
    startScreen.style.display = "none";
    spawnLoop();
}

// 마우스 이동
game.addEventListener("mousemove", (e) => {
    if (!gameStarted || gameOver) return;

    const gameRect = game.getBoundingClientRect();
    let currentX = e.clientX - gameRect.left;

    if (currentX < 30) currentX = 30;
    if (currentX > gameRect.width - 30) currentX = gameRect.width - 30;

    player.style.transform = "none";
    player.style.left = (currentX - 30) + "px";
});

// 터치 이동
game.addEventListener("touchmove", (e) => {
    if (!gameStarted || gameOver) return;

    const touch = e.touches[0];
    const gameRect = game.getBoundingClientRect();
    let currentX = touch.clientX - gameRect.left;

    if (currentX < 30) currentX = 30;
    if (currentX > gameRect.width - 30) currentX = gameRect.width - 30;

    player.style.transform = "none";
    player.style.left = (currentX - 30) + "px";
});

// 똥 생성 (속도 대폭 상향)
function createPoop(){
    const poop = document.createElement("div");
    poop.classList.add("item");

    if(goldenMode){
        poop.innerText = "💩✨";
    }else{
        poop.innerText = "💩";
    }

    let x = Math.random() * (window.innerWidth - 40);
    let y = -50;
    
    // ★ 기존 기본속도 (3 ~ 6) -> 변경된 속도 (7 ~ 13)로 대폭 상향!
    let speed = 7 + Math.random() * 6; 

    poop.style.left = x + "px";
    poop.style.top = y + "px";
    game.appendChild(poop);

    function fall(){
        if(gameOver) return;

        y += speed;
        poop.style.top = y + "px";

        const playerRect = player.getBoundingClientRect();
        const poopRect = poop.getBoundingClientRect();

        if(
            poopRect.left < playerRect.right &&
            poopRect.right > playerRect.left &&
            poopRect.top < playerRect.bottom &&
            poopRect.bottom > playerRect.top
        ){
            poop.remove();
            lives--;
            updateHearts();

            if(lives <= 0){
                gameOver = true;
                saveScore();
                loadRankings();
                finalScore.innerHTML = `<h3>${username}</h3><h2>점수 : ${score}</h2>`;
                rankingBox.style.display = "block";
            }
            return;
        }

        if(y > window.innerHeight){
            poop.remove();
            return;
        }

        requestAnimationFrame(fall);
    }
    fall();
}

// 골드 생성 (속도 상향)
function createGold(){
    const gold = document.createElement("div");
    gold.classList.add("item");
    gold.innerText = "🪙";

    let x = Math.random() * (window.innerWidth - 40);
    let y = -50;
    
    // ★ 기존 속도 4 -> 8로 상향하여 스릴을 더했습니다.
    let speed = 8; 

    gold.style.left = x + "px";
    gold.style.top = y + "px";
    game.appendChild(gold);

    function fall(){
        if(gameOver) return;

        y += speed;
        gold.style.top = y + "px";

        const playerRect = player.getBoundingClientRect();
        const goldRect = gold.getBoundingClientRect();

        if(
            goldRect.left < playerRect.right &&
            goldRect.right > playerRect.left &&
            goldRect.top < playerRect.bottom &&
            goldRect.bottom > playerRect.top
        ){
            gold.remove();
            goldCount++;
            score += 10;

            scoreText.innerText = "점수 : " + score;
            goldText.innerText = "골드 : " + goldCount + " / 100";

            if(goldCount >= 100){
                goldenMode = true;
                document.body.style.background = "radial-gradient(circle, gold, black)";
            }
            return;
        }

        if(y > window.innerHeight){
            gold.remove();
            return;
        }

        requestAnimationFrame(fall);
    }
    fall();
}

// 루프 실행 (점수가 오를수록 더 빽빽하게 쏟아집니다)
function spawnLoop(){
    if(gameOver) return;

    if(Math.random() < 0.5){
        createPoop();
    }
    if(Math.random() < 0.35){
        createGold();
    }

    // 기본 생성 딜레이도 점수에 따라 더 빠르게 좁혀집니다.
    let delay = 600 - score * 0.25;
    if(delay < 180){
        delay = 180;
    }

    setTimeout(spawnLoop, delay);
}

// 다시 시작 버튼
restartBtn.addEventListener("click", ()=>{
    location.reload();
});
</script>
</body>
</html>
